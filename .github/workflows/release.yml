name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump project version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
            echo "This workflow must be run from a branch ref." >&2
            exit 1
          fi

          current_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          if [[ ! "${current_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid version: ${current_version}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump: ${{ inputs.bump }}" >&2
              exit 1
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          tag="v${new_version}"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag already exists: ${tag}" >&2
            exit 1
          fi

          export NEW_VERSION="${new_version}"
          perl -0pi -e 's/(\[package\]\nname = "rebind"\nversion = ")[^"]+(")/$1$ENV{NEW_VERSION}$2/' src-tauri/Cargo.toml
          perl -0pi -e 's/(\[\[package\]\]\nname = "rebind"\nversion = ")[^"]+(")/$1$ENV{NEW_VERSION}$2/' Cargo.lock

          tmp="$(mktemp)"
          jq --arg version "${new_version}" '.version = $version' src-tauri/tauri.conf.json > "${tmp}"
          mv "${tmp}" src-tauri/tauri.conf.json

          echo "version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Commit and tag version
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src-tauri/Cargo.toml src-tauri/tauri.conf.json Cargo.lock
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build-windows:
    name: Build Windows ${{ matrix.arch }}
    needs: bump-version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Install Rust target
        shell: pwsh
        run: rustup target add ${{ matrix.target }}

      - name: Build binary
        shell: pwsh
        run: cargo build --release --locked --package rebind --target ${{ matrix.target }}

      - name: Rename binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item `
            "target/${{ matrix.target }}/release/rebind.exe" `
            "dist/rebind-${{ needs.bump-version.outputs.tag }}-windows-${{ matrix.arch }}.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rebind-windows-${{ matrix.arch }}
          path: dist/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs:
      - bump-version
      - build-windows
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.bump-version.outputs.tag }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${TAG}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --notes "Release ${TAG}"
